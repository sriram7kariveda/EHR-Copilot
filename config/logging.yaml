version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
  detailed:
    format: "%(asctime)s | %(name)s | %(levelname)s | %(funcName)s:%(lineno)d | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

loggers:
  ehr_copilot:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]
