app:
  name: "EHR Copilot"
  version: "0.1.0"
  debug: false

llm:
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"
  api_key: ""  # Set via EHR__LLM__API_KEY env var
  model: "qwen/qwen3-8b"
  temperature: 0.1
  max_tokens: 2048
  timeout_seconds: 120

embedding:
  model: "NeuML/pubmedbert-base-embeddings"
  dimension: 768
  batch_size: 32
  device: "cpu"

indexing:
  faiss:
    index_type: "FlatIP"
    nprobe: 10
  bm25:
    k1: 1.5
    b: 0.75
  retrieval:
    top_k_dense: 30
    top_k_sparse: 30
    rrf_k: 20
    final_top_k: 15

chunking:
  max_chunk_tokens: 512
  overlap_tokens: 128
  min_chunk_tokens: 50

agents:
  max_retry_loops: 2
  router:
    prompt_template: "router.txt"
  reasoning:
    prompt_template: "reasoning_cot.txt"
  temporal_validator:
    prompt_template: "temporal_check.txt"
  numeric_validator:
    prompt_template: "numeric_check.txt"
  critic:
    prompt_template: "critic.txt"

audit:
  db_path: "./data/audit.db"
  enabled: true

logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
